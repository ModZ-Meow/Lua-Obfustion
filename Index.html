<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModZ Obfuscator</title>

<style>

body{
    background:#050505;
    color:#fff;
    font-family:Consolas,monospace;
    overflow:hidden;
}

.ui{
    width:950px;
    padding:20px;
    border:3px solid #ff00ff;
    border-radius:14px;
    background:#0a0a0a;
    position:absolute;
    left:50px;
    top:50px;
    cursor:move;
    box-shadow:0 0 30px #ff00ff;
}

h3{
    margin-top:0;
    color:#ff00ff;
    text-shadow:0 0 12px #ff00ff;
}

textarea{
    width:100%;
    height:240px;
    background:#000;
    color:#00ff00;
    border:2px solid #ff00ff;
    padding:12px;
    margin-top:10px;
    resize:none;
    outline:none;
    font-family:Consolas,monospace;
    font-size:14px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#ff00ff;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    transition:.15s;
    font-size:15px;
}

button:hover{
    transform:scale(1.01);
    box-shadow:0 0 20px #ff00ff;
}

</style>
</head>

<body>

<div class="ui" id="box">

    <h3>[ ModZ Obfuscation V1.4 ]</h3>

    <textarea id="input" placeholder="Paste Lua script here..."></textarea>

    <button onclick="idk()">
        Obfuscate
    </button>

    <textarea id="output" readonly placeholder="Output..."></textarea>

</div>

<script>

function idk(){

    let raw = document.getElementById("input").value;

    if(!raw.trim()){
        alert("Paste script first");
        return;
    }

    let bytes = Array.from(raw).map(c => c.charCodeAt(0));

    let bc = [];

    let key = 0x55;
    let ip = 1;

    for(let b of bytes){

        key ^= ip;

        bc.push(0x01, b ^ key);

        ip += 2;
    }

    key ^= ip;

    bc.push(0x03, 0);

    let template = `--[[

    ModZ Obfuscation V1.4

]]--

local _VM = {
    S = {},
    IP = 1,
    BC = {${bc.join(",")}},
    K = 0x55
}

local _OPS = {

    [0x01] = function(v)

        table.insert(
            _VM.S,
            string.char(
                bit32.bxor(v, _VM.K)
            )
        )

    end,

    [0x03] = function()

        local src = table.concat(_VM.S)

        local fn =
            (loadstring or load)(src)

        return fn()

    end
}

while _VM.IP <= #_VM.BC do

    local op = _VM.BC[_VM.IP]

    _VM.K = bit32.bxor(_VM.K, _VM.IP)

    local handler = _OPS[op]

    if handler then
        handler(_VM.BC[_VM.IP + 1])
    end

    _VM.IP = _VM.IP + 2
end`;

    document.getElementById("output").value = template;
}

const box = document.getElementById("box");

box.onmousedown = function(e){

    let offsetX = e.clientX - box.offsetLeft;
    let offsetY = e.clientY - box.offsetTop;

    document.onmousemove = function(e){

        box.style.left = (e.pageX - offsetX) + "px";
        box.style.top  = (e.pageY - offsetY) + "px";
    };

    document.onmouseup = function(){

        document.onmousemove = null;
        document.onmouseup = null;
    };
};

</script>

</body>
  </html>
